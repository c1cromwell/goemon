name: GoemonWallet
options:
  bundleIdPrefix: com.goemonglobal
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  HieroSDK:
    url: https://github.com/hiero-ledger/hiero-sdk-swift
    from: 0.49.0

targets:
  GoemonWallet:
    type: application
    platform: iOS
    sources:
      - path: GoemonWallet
        excludes:
          - Info.plist
    info:
      path: GoemonWallet/Info.plist
      properties:
        CFBundleName: GoemonWallet
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        CFBundleInfoDictionaryVersion: "6.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: GoemonWallet/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.goemonglobal.wallet
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: HieroSDK
        product: Hiero

schemes:
  GoemonWallet:
    build:
      targets:
        GoemonWallet: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
