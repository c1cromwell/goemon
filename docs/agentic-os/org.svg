      .box-gate { fill: rgba(45,212,167,0.08); stroke: #2dd4a7; stroke-width: 1.5; rx: 8; stroke-dasharray: 4 3; }
      .title { font: 600 13px system-ui, sans-serif; fill: #f3f5f8; }
      .sub { font: 400 10px system-ui, sans-serif; fill: #9aa3b0; }
      .label { font: 600 11px system-ui, sans-serif; fill: #6b7480; letter-spacing: 0.08em; }
      .line { stroke: #333a45; stroke-width: 1.5; fill: none; }
      .line-accent { stroke: #2dd4a7; stroke-width: 1.5; fill: none; opacity: 0.6; }
    </style>
  </defs>
  <rect width="900" height="620" fill="#0b0d10"/>

