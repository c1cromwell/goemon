<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Goeman — Logo Concepts 01–10</title>
  <style>
    :root { --bg: #0b0d10; --surface: #141820; --text: #e8eaed; --muted: #6b7480; --accent: #2dd4a7; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
    h1 { font-weight: 600; letter-spacing: 0.04em; }
    .subtitle { color: var(--muted); max-width: 52rem; line-height: 1.5; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .card { background: var(--surface); border: 1px solid #1e2430; border-radius: 8px; overflow: hidden; }
    .card img { width: 100%; display: block; background: var(--bg); }
    .card figcaption { padding: 1rem; font-size: 0.85rem; }
    .card figcaption strong { color: var(--accent); display: block; margin-bottom: 0.25rem; }
    .card figcaption span { color: var(--muted); }
  </style>
</head>
<body>
  <h1>Goeman Global Finance — Logo Concepts</h1>
  <p class="subtitle">
    Ten draft marks for review. Motto: <strong>Build | Protect | Preserve</strong> — Your Trust &amp; Your Assets.
    Cultural anchor: Ishikawa Goemon (social justice, protect the vulnerable). Subtle kanji option: <strong>誠</strong> (sincerity).
  </p>
  <div class="grid">
    <figure class="card"><img src="01-kanji-makoto.svg" alt="01 kanji makoto"/><figcaption><strong>01 — 誠 Makoto</strong><span>Subtle sincerity mark; recommended primary direction.</span></figcaption></figure>
    <figure class="card"><img src="02-crossed-katanas.svg" alt="02 crossed katanas"/><figcaption><strong>02 — Crossed Katanas</strong><span>Discipline, balance, Iga heritage.</span></figcaption></figure>
    <figure class="card"><img src="03-globe-katana.svg" alt="03 globe katana"/><figcaption><strong>03 — Globe + Blade</strong><span>Global finance with decisive arc.</span></figcaption></figure>
    <figure class="card"><img src="04-shield-blade.svg" alt="04 shield blade"/><figcaption><strong>04 — Shield + Blade</strong><span>Protect pillar; custody and defense.</span></figcaption></figure>
    <figure class="card"><img src="05-wordmark-goeman.svg" alt="05 wordmark"/><figcaption><strong>05 — Wordmark</strong><span>DBA lockup with 誠 icon.</span></figcaption></figure>
    <figure class="card"><img src="06-three-pillars.svg" alt="06 three pillars"/><figcaption><strong>06 — Three Pillars</strong><span>Build | Protect | Preserve motto strip.</span></figcaption></figure>
    <figure class="card"><img src="07-hanko-seal.svg" alt="07 hanko seal"/><figcaption><strong>07 — Hanko Seal</strong><span>Traditional seal with G monogram.</span></figcaption></figure>
    <figure class="card"><img src="08-ichimonji-ken.svg" alt="08 ichimonji"/><figcaption><strong>08 — Ichimonji Cut</strong><span>剣に生き剣に死す — founder culture (heavy).</span></figcaption></figure>
    <figure class="card"><img src="09-ninja-negative.svg" alt="09 ninja negative"/><figcaption><strong>09 — Abstract Silhouette</strong><span>Folklore nod; asset in negative space.</span></figcaption></figure>
    <figure class="card"><img src="10-full-lockup.svg" alt="10 full lockup"/><figcaption><strong>10 — Full Lockup</strong><span>Mark + name + motto + domain.</span></figcaption></figure>
  </div>
</body>
</html>
